name: 功能需求
description: 提議能解決明確使用者問題的新功能或改善
title: "[Feature]: "
labels:
  - "type:feature"
  - "attention:triage"
body:
  - type: markdown
    attributes:
      value: |
        感謝你提出功能需求。請先描述問題與成功條件，不要只描述預想解法。
  - type: textarea
    id: problem
    attributes:
      label: 問題與受影響使用者
      description: 誰在什麼情境遇到什麼問題？
      placeholder: 身為…，當…時，我無法…，因此…
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: 目前替代方式
      description: 目前如何處理？替代方式有什麼不足？
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 預期成果與成功條件
      description: 完成後應能觀察到什麼結果？請使用可驗證的敘述。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 驗收情境
      description: 維護者應如何重現並確認功能有效？
      placeholder: |
        1. 給定…
        2. 當…
        3. 則…
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: 不處理的範圍
      description: 這項需求明確不包含什麼？
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: 可能影響
      description: 勾選所有可能受影響的項目；不確定時可不勾選並在補充資訊說明。
      options:
        - label: 隱私或個人資料
        - label: 安全或權限
        - label: 資料格式或資料遷移
        - label: 公開 API 或向後相容性
        - label: 新增長期運行服務或外部依賴
  - type: textarea
    id: additional
    attributes:
      label: 補充資訊
      description: 可附上流程、畫面、連結或替代方案。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前確認
      options:
        - label: 我已搜尋現有 Issues，確認沒有重複需求。
          required: true
        - label: 我理解提交需求不代表已承諾排程或實作。
          required: true
