name: 錯誤回報
description: 回報可重現的錯誤、回歸或非預期行為
title: "[Bug]: "
labels:
  - "type:bug"
  - "status:needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        請勿貼上 API key、token、履歷內容或其他個人資料。安全漏洞請依安全政策私下回報。
  - type: textarea
    id: summary
    attributes:
      label: 問題摘要
      description: 清楚描述實際發生的錯誤。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 重現步驟
      placeholder: |
        1. 使用 Docker Compose 啟動…
        2. 前往…
        3. 執行…
        4. 看到…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 預期行為
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 實際行為與錯誤訊息
      description: 貼上已移除密鑰與個人資料的錯誤資訊。
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pro-Copilot 版本或 commit
      placeholder: v1.0.0 或 commit SHA
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: 執行環境
      options:
        - Docker Compose
        - GitHub Codespaces
        - 其他容器環境
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: 作業系統與瀏覽器
      placeholder: Windows 11 / Docker Desktop / Chrome 版本
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 已去除敏感資訊的日誌
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前確認
      options:
        - label: 我已搜尋現有 Issues，確認沒有重複回報。
          required: true
        - label: 我已移除 API key、token、履歷內容與其他個人資料。
          required: true
